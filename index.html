<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast English Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;}

/* NAV */
#nav{background:#16213e;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid #0f3460;}
.nav-title{font-family:'Fredoka One',cursive;font-size:20px;color:#e94560;flex:1;}
.nav-btn{background:#0f3460;border:none;color:#aaa;font-family:'Nunito',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
.nav-btn:hover,.nav-btn.active{background:#e94560;color:white;}

/* MAIN */
#main{max-width:760px;margin:0 auto;padding:16px;}

/* HOME */
#s-home{padding:20px 0;}
.home-title{font-family:'Fredoka One',cursive;font-size:28px;color:#e94560;margin-bottom:6px;}
.home-sub{color:#888;font-size:14px;margin-bottom:20px;}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px;}
.group-card{background:#16213e;border:2px solid #0f3460;border-radius:12px;padding:14px;cursor:pointer;transition:all 0.2s;position:relative;}
.group-card:hover{border-color:#e94560;transform:translateY(-2px);}
.group-card.selected{border-color:#e94560;background:#1a0a14;}
.group-card .gc-name{font-size:14px;font-weight:700;color:#eee;margin-bottom:3px;}
.group-card .gc-count{font-size:12px;color:#888;}
.group-card .gc-check{position:absolute;top:8px;right:8px;font-size:16px;display:none;}
.group-card.selected .gc-check{display:block;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mode-card{background:#16213e;border:2px solid #0f3460;border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;text-align:center;}
.mode-card:hover{border-color:#e94560;}
.mode-card .mc-icon{font-size:28px;margin-bottom:6px;}
.mode-card .mc-name{font-size:15px;font-weight:700;color:#eee;}
.mode-card .mc-desc{font-size:12px;color:#888;margin-top:3px;}
.start-btn{width:100%;background:#e94560;border:none;color:white;font-family:'Fredoka One',cursive;font-size:20px;padding:14px;border-radius:12px;cursor:pointer;transition:all 0.2s;}
.start-btn:hover{background:#c73652;}
.start-btn:disabled{background:#444;cursor:not-allowed;}

/* LEARN MODE */
.learn-card{background:#16213e;border-radius:16px;padding:24px;margin-bottom:16px;}
.lc-group{font-size:12px;color:#e94560;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.lc-word{font-size:32px;font-weight:800;color:#eee;margin-bottom:4px;}
.lc-pos{font-size:13px;color:#888;margin-bottom:12px;}
.lc-thai{font-size:18px;color:#f5a623;font-weight:700;margin-bottom:12px;}
.lc-level{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px;}
.level-1{background:#1a3a1a;color:#5dde5d;}
.level-2{background:#3a2a1a;color:#f5a623;}
.level-3{background:#3a1a1a;color:#e94560;}
.lc-sentence{background:#0f3460;border-radius:10px;padding:14px;margin-bottom:10px;}
.lc-sentence .blank{color:#5dde5d;font-weight:800;}
.lc-sentence .en{font-size:15px;color:#eee;margin-bottom:4px;}
.lc-sentence .th{font-size:13px;color:#888;}
.lc-note{background:#1a1a2e;border-left:3px solid #e94560;padding:10px 14px;font-size:13px;color:#aaa;border-radius:0 8px 8px 0;margin-bottom:16px;}
.lc-synonyms{margin-bottom:16px;}
.lc-synonyms .syn-title{font-size:12px;color:#888;margin-bottom:6px;}
.syn-list{display:flex;flex-wrap:wrap;gap:6px;}
.syn-pill{background:#0f3460;border-radius:20px;padding:4px 12px;font-size:13px;color:#aaa;}
.syn-pill.current{background:#e94560;color:white;}
.nav-row{display:flex;gap:10px;align-items:center;margin-top:8px;}
.nav-row .nr-count{flex:1;text-align:center;font-size:13px;color:#888;}
.btn{background:#0f3460;border:none;color:#eee;font-family:'Nunito',sans-serif;font-size:14px;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all 0.2s;}
.btn:hover{background:#1a4a7a;}
.btn-red{background:#e94560;}
.btn-red:hover{background:#c73652;}
.btn-green{background:#1a6e3a;}
.btn-green:hover{background:#0f5a2e;}

/* TEST MODES */
.progress-wrap{background:#0f3460;border-radius:4px;height:6px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:#e94560;border-radius:4px;transition:width 0.4s;}
.stats-row{display:flex;gap:10px;margin-bottom:16px;}
.stat-box{flex:1;background:#16213e;border-radius:10px;padding:8px;text-align:center;}
.stat-box .sb-n{font-size:20px;font-weight:800;}
.stat-box .sb-l{font-size:11px;color:#888;}
.q-card{background:#16213e;border-radius:16px;padding:20px;margin-bottom:14px;}
.q-group{font-size:11px;color:#e94560;font-weight:700;margin-bottom:6px;text-transform:uppercase;}
.q-sentence{font-size:17px;line-height:1.7;margin-bottom:6px;}
.q-blank{display:inline-block;border-bottom:2px solid #e94560;min-width:90px;text-align:center;color:#e94560;font-weight:700;padding:0 8px;}
.q-thai{font-size:13px;color:#888;margin-bottom:16px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.opt{background:#0f3460;border:1.5px solid #1a4a7a;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;color:#eee;text-align:left;transition:all 0.15s;font-family:'Nunito',sans-serif;}
.opt:hover{border-color:#e94560;}
.opt.correct{background:#1a3a1a;border-color:#5dde5d;color:#5dde5d;}
.opt.wrong{background:#3a1a1a;border-color:#e94560;color:#e94560;}
.opt:disabled{cursor:default;}
.feedback{border-radius:10px;padding:12px 16px;margin-bottom:12px;display:none;}
.feedback.show{display:block;}
.fb-ok{background:#1a3a1a;border-left:3px solid #5dde5d;}
.fb-no{background:#3a1a1a;border-left:3px solid #e94560;}
.fb-word{font-size:16px;font-weight:800;color:#eee;margin-bottom:4px;}
.fb-thai{font-size:14px;color:#f5a623;margin-bottom:6px;}
.fb-note{font-size:13px;color:#aaa;}

/* FLASHCARD */
.flashcard{background:#16213e;border-radius:20px;padding:32px 24px;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin-bottom:16px;border:2px solid #0f3460;}
.flashcard:hover{border-color:#e94560;}
.fc-front .fc-word{font-size:36px;font-weight:800;color:#eee;margin-bottom:8px;}
.fc-front .fc-pos{font-size:14px;color:#888;}
.fc-back .fc-thai{font-size:24px;font-weight:700;color:#f5a623;margin-bottom:10px;}
.fc-back .fc-sent{font-size:14px;color:#aaa;line-height:1.6;}
.fc-hint{font-size:13px;color:#888;margin-top:12px;}
.rating-row{display:flex;gap:8px;margin-bottom:16px;}
.rating-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.rb-hard{background:#3a1a1a;color:#e94560;}
.rb-ok{background:#3a2a1a;color:#f5a623;}
.rb-easy{background:#1a3a1a;color:#5dde5d;}

/* MATCHING */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.match-item{background:#0f3460;border:1.5px solid #1a4a7a;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;color:#eee;text-align:center;transition:all 0.15s;min-height:52px;display:flex;align-items:center;justify-content:center;}
.match-item:hover{border-color:#e94560;}
.match-item.selected{border-color:#f5a623;background:#2a1a0a;color:#f5a623;}
.match-item.matched{border-color:#5dde5d;background:#1a3a1a;color:#5dde5d;cursor:default;}
.match-item.wrong-flash{border-color:#e94560;background:#3a1a1a;}

/* ORDERING */
.order-items{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.order-item{background:#0f3460;border:1.5px solid #1a4a7a;border-radius:10px;padding:12px 16px;cursor:grab;color:#eee;display:flex;align-items:center;gap:10px;transition:all 0.15s;}
.order-item:hover{border-color:#e94560;}
.order-item.dragging{opacity:0.5;}
.order-num{width:24px;height:24px;background:#1a4a7a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.order-item.correct-pos{border-color:#5dde5d;background:#1a3a1a;}
.order-item.wrong-pos{border-color:#e94560;background:#3a1a1a;}
.check-btn{width:100%;background:#0f3460;border:none;color:#eee;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;margin-bottom:12px;}
.check-btn:hover{background:#1a4a7a;}

/* END */
.end-screen{text-align:center;padding:32px 16px;}
.end-score{font-size:56px;font-weight:800;color:#e94560;font-family:'Fredoka One',cursive;}
.end-label{font-size:16px;color:#888;margin-bottom:20px;}
.wrong-review{text-align:left;margin-top:16px;}
.wr-title{font-size:14px;font-weight:700;margin-bottom:10px;color:#eee;}
.wr-item{padding:10px 0;border-bottom:1px solid #0f3460;}
.wr-word{font-size:15px;font-weight:700;color:#e94560;}
.wr-thai{font-size:13px;color:#f5a623;}
.wr-note{font-size:12px;color:#888;margin-top:3px;}

.timer-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#1a4a7a;stroke-width:4;}
.ring-fill{fill:none;stroke:#5dde5d;stroke-width:4;stroke-linecap:round;stroke-dasharray:138;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#eee;}
.game-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.gm-thai{font-size:24px;font-weight:800;color:#eee;}
.gm-hint{font-size:12px;color:#888;margin-top:2px;}
.cl-score-badge{background:#16213e;border-radius:10px;padding:8px 16px;text-align:center;}
.cl-input-row{display:flex;gap:8px;margin-bottom:12px;}
.cl-input-row input{flex:1;background:rgba(255,255,255,0.1);border:2px solid #0f3460;border-radius:10px;color:white;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;padding:8px 12px;outline:none;}
.cl-input-row input:focus{border-color:#5dde5d;}
.cl-input-row input.cl-ok{border-color:#5dde5d;background:rgba(93,222,93,0.1);}
.cl-input-row input.cl-wrong{border-color:#e94560;animation:shk 0.3s;}
.cl-input-row button{background:#0f3460;border:none;color:#aaa;border-radius:10px;padding:0 16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;}
.cl-input-row button:hover{background:#1a4a7a;color:#eee;}
.found-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:32px;}
.fp{border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;}
.fp-found{background:#1a3a1a;color:#5dde5d;}
.fp-missed{background:#3a1a1a;color:#e94560;}
.hint-section{background:#0f3460;border-radius:10px;padding:10px 14px;margin-bottom:10px;}
.hint-title{font-size:11px;color:#888;margin-bottom:6px;}
.hint-row{display:flex;gap:6px;flex-wrap:wrap;}
.hp{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.hp-formal{background:#0c447c;color:#b5d4f4;}
.hp-spoken{background:#633806;color:#fac775;}
.hp-literary{background:#3c3489;color:#cecbf6;}
.hp-strong{background:#3a1a1a;color:#e94560;}
.hp-mild{background:#1a3a1a;color:#5dde5d;}
.reveal-btn{width:100%;padding:10px;background:#0f3460;border:none;color:#888;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:8px;}
.reveal-btn:hover{color:#eee;}
.cl-result-card{background:#16213e;border-radius:12px;padding:16px;margin-bottom:10px;}
.cl-rc-thai{font-size:18px;font-weight:800;color:#eee;margin-bottom:10px;}
.cl-rw{border-radius:8px;padding:8px 12px;margin-bottom:6px;}
.cl-rw-found{background:#1a3a1a;}
.cl-rw-missed{background:#3a1a1a;}
.cl-rw-word{font-size:14px;font-weight:700;}
.cl-rw-found .cl-rw-word{color:#5dde5d;}
.cl-rw-missed .cl-rw-word{color:#e94560;}
.cl-rw-note{font-size:12px;color:#888;margin-top:2px;}
.cl-final{text-align:center;padding:20px 0;}
.cl-final-score{font-size:48px;font-weight:800;color:#5dde5d;font-family:'Fredoka One',cursive;}
.cl-final-label{font-size:15px;color:#888;margin-bottom:16px;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>

<div id="nav">
  <div class="nav-title">📚 Fast English</div>
  <button class="nav-btn active" id="nb-home" onclick="goHome()">🏠 หน้าหลัก</button>
  <button class="nav-btn" id="nb-learn" onclick="startLearn()">📖 เรียน</button>
  <button class="nav-btn" id="nb-test" onclick="showTestMenu()">✏️ ทดสอบ</button>
</div>

<div id="main">
  <!-- HOME -->
  <div id="s-home">
    <div class="home-title">Fast English Vocab Trainer</div>
    <div class="home-sub">เลือกหมวดคำศัพท์ที่ต้องการฝึก</div>
    <div class="group-grid" id="groupGrid"></div>
    <div id="modeSection" style="display:none;">
      <div style="font-size:14px;font-weight:700;color:#888;margin-bottom:10px;">เลือกโหมด:</div>
      <div class="mode-grid">
        <div class="mode-card" onclick="selectMode('learn')">
          <div class="mc-icon">📖</div>
          <div class="mc-name">เรียน</div>
          <div class="mc-desc">อ่านคำ + อธิบาย</div>
        </div>
        <div class="mode-card" onclick="selectMode('fill')">
          <div class="mc-icon">✏️</div>
          <div class="mc-name">Fill in Blank</div>
          <div class="mc-desc">เติมคำในประโยค</div>
        </div>
        <div class="mode-card" onclick="selectMode('mcq')">
          <div class="mc-icon">🎯</div>
          <div class="mc-name">MCQ</div>
          <div class="mc-desc">เลือกตอบ 4 ตัวเลือก</div>
        </div>
        <div class="mode-card" onclick="selectMode('flash')">
          <div class="mc-icon">🃏</div>
          <div class="mc-name">Flashcard</div>
          <div class="mc-desc">พลิกดูคำ-ความหมาย</div>
        </div>
        <div class="mode-card" onclick="selectMode('match')">
          <div class="mc-icon">🔗</div>
          <div class="mc-name">จับคู่</div>
          <div class="mc-desc">คำ ↔ ความหมาย</div>
        </div>
        <div class="mode-card" onclick="selectMode('order')">
          <div class="mc-icon">📊</div>
          <div class="mc-name">เรียงระดับ</div>
          <div class="mc-desc">เบา → แรง</div>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="startSelected()" disabled>▶ เริ่มเลย!</button>
    </div>
  </div>

  <!-- LEARN -->
  <div id="s-learn" style="display:none;"></div>

  <!-- TEST -->
  <div id="s-test" style="display:none;"></div>
</div>

<script>
// ===================== DATA =====================
const VOCAB = [
  // ===== 1. FEELING — ประหลาดใจ =====
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"surprise",pos:"v/n",thai:"ประหลาดใจ (ทั่วไป)",level:1,levelLabel:"เบา",
   sentence:"I was ___ at the news — no one had told me about the promotion.",
   sentenceTh:"ฉันประหลาดใจกับข่าวนั้น — ไม่มีใครบอกฉันเรื่องการเลื่อนตำแหน่งเลย",
   note:"ใช้ได้ทุกบริบท เป็น base word ของหมวดนี้",synonyms:["surprise","amaze","astonish","astound","startle","puzzle","shock"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"amaze",pos:"v",thai:"ประหลาดใจจนชื่นชม",level:2,levelLabel:"กลาง",
   sentence:"The young pianist ___ the audience with her flawless performance.",
   sentenceTh:"นักเปียโนสาวทำให้ผู้ชมทึ่งด้วยการแสดงที่สมบูรณ์แบบ",
   note:"amazed = ประหลาดใจในเชิงชื่นชม / amazing = น่าทึ่ง",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"astonish",pos:"v",thai:"ทำให้ตกใจ จนแทบไม่เชื่อ",level:2,levelLabel:"กลาง",
   sentence:"It ___ me that anyone could eat that much in one sitting.",
   sentenceTh:"มันทำให้ฉันตกใจที่มีคนสามารถกินได้มากขนาดนั้นในมื้อเดียว",
   note:"astonishment (n) / astonishing (adj) — แรงกว่า amaze เล็กน้อย",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"astound",pos:"v",thai:"ตะลึงงัน พูดไม่ออก",level:3,levelLabel:"แรงมาก",
   sentence:"The scientist was ___ to discover that the ancient fossil was over 500 million years old.",
   sentenceTh:"นักวิทยาศาสตร์ตะลึงงันเมื่อพบว่าฟอสซิลโบราณนั้นมีอายุกว่า 500 ล้านปี",
   note:"แรงที่สุดในกลุ่ม — astounding = น่าตะลึง / astounded = ตะลึงงันจนพูดไม่ออก",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"startle",pos:"v",thai:"ทำให้สะดุ้ง ตกใจกะทันหัน",level:2,levelLabel:"กลาง",
   sentence:"The sudden sound of the alarm ___ everyone in the quiet library.",
   sentenceTh:"เสียงสัญญาณเตือนที่ดังกะทันหันทำให้ทุกคนในห้องสมุดเงียบสะดุ้งตกใจ",
   note:"เน้นการตกใจกะทันหันจากสิ่งภายนอก เช่น เสียง การปรากฏตัว",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"puzzle",pos:"v/n",thai:"งุนงง ไม่เข้าใจ",level:1,levelLabel:"เบา",
   sentence:"His strange behaviour completely ___ his colleagues — no one knew what he was thinking.",
   sentenceTh:"พฤติกรรมแปลกๆ ของเขาทำให้เพื่อนร่วมงานงุนงงโดยสิ้นเชิง",
   note:"puzzle = งุนงงเพราะหาเหตุผลไม่ได้ / puzzled (adj) = สับสนงุนงง",synonyms:["puzzle","confused","baffled"]},

  // ===== 1. FEELING — อารมณ์เสีย =====
  {group:"1. Feeling — อารมณ์เสีย",gid:"f_upset",word:"upset",pos:"v/n",thai:"อารมณ์เสีย หงุดหงิด รบกวนจิตใจ",level:1,levelLabel:"เบา",
   sentence:"Don't ___ yourself over small problems that you can't control.",
   sentenceTh:"อย่าเสียอารมณ์กับปัญหาเล็กน้อยที่คุณควบคุมไม่ได้",
   note:"ทั่วไปที่สุดในกลุ่ม / upset (n) = ความวุ่นวาย ความไม่คาดฝัน",synonyms:["upset","grumpy","irritate","disconcerted"]},

// ============ GROUP INDEX ============
function getGroups() {
  const map = {};
  VOCAB.forEach(v => {
    if (!map[v.gid]) map[v.gid] = { name: v.group, gid: v.gid, words: [] };
    map[v.gid].words.push(v);
  });
  return Object.values(map);
}

// ============ STATE ============
let selGroups = [], selMode = null;
let learnIdx = 0, learnWords = [];
let testWords = [], testIdx = 0, testScore = 0, testWrong = [];
let fcFlipped = false, fcWords = [], fcIdx = 0, fcHard = [], fcOk = [], fcEasy = [];
let matchWords = [], matchLeft = [], matchRight = [], matchSel = null, matchDone = 0;

// ============ HOME ============
function buildHome() {
  const groups = getGroups();
  let html = '';
  groups.forEach(g => {
    const sel = selGroups.includes(g.gid);
    html += `<div class="group-card${sel?' selected':''}" onclick="toggleGroup('${g.gid}')">
      <div class="gc-check">✅</div>
      <div class="gc-name">${g.name}</div>
      <div class="gc-count">${g.words.length} คำ</div>
    </div>`;
  });
  document.getElementById('groupGrid').innerHTML = html;
  document.getElementById('modeSection').style.display = selGroups.length > 0 ? 'block' : 'none';
  document.getElementById('startBtn').disabled = !selMode;
}

function toggleGroup(gid) {
  const i = selGroups.indexOf(gid);
  if (i >= 0) selGroups.splice(i, 1);
  else selGroups.push(gid);
  buildHome();
}

function selectMode(m) {
  selMode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.style.border = '2px solid #0f3460');
  event.currentTarget.style.border = '2px solid #e94560';
  document.getElementById('startBtn').disabled = false;
}

function getSelectedWords() {
  return VOCAB.filter(v => selGroups.includes(v.gid));
}

function shuffle(a) { const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }

function startSelected() {
  const words = getSelectedWords();
  if (words.length === 0) return;
  if (selMode === 'learn') startLearnMode(words);
  else if (selMode === 'fill') startFillMode(words);
  else if (selMode === 'mcq') startMCQMode(words);
  else if (selMode === 'flash') startFlashMode(words);
  else if (selMode === 'match') startMatchMode(words);
  else if (selMode === 'order') startOrderMode(words);
  else if (selMode === 'cluster') startClusterMode(words);
}

function goHome() {
  showScreen('s-home');
  setNavActive('nb-home');
}

function showScreen(id) {
  ['s-home','s-learn','s-test'].forEach(s => document.getElementById(s).style.display = s===id?'block':'none');
}

function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ LEARN MODE ============
function startLearnMode(words) {
  learnWords = words;
  learnIdx = 0;
  showScreen('s-learn');
  setNavActive('nb-learn');
  renderLearn();
}

function startLearn() {
  if (selGroups.length === 0) { goHome(); return; }
  startLearnMode(getSelectedWords());
}

function renderLearn() {
  const w = learnWords[learnIdx];
  const levelColors = ['','level-1','level-2','level-3'];
  const synHtml = w.synonyms ? w.synonyms.map(s =>
    `<span class="syn-pill${s===w.word?' current':''}">${s}</span>`).join('') : '';

  document.getElementById('s-learn').innerHTML = `
    <div class="learn-card">
      <div class="lc-group">${w.group}</div>
      <div class="lc-word">${w.word}</div>
      <div class="lc-pos">${w.pos}</div>
      <div class="lc-thai">${w.thai}</div>
      ${w.level ? `<span class="lc-level ${levelColors[w.level]}">${w.levelLabel}</span>` : ''}
      <div class="lc-sentence">
        <div class="en">${w.sentence.replace('___', `<span class="blank">${w.word}</span>`)}</div>
        <div class="th">${w.sentenceTh}</div>
      </div>
      ${w.note ? `<div class="lc-note">💡 ${w.note}</div>` : ''}
      ${synHtml ? `<div class="lc-synonyms"><div class="syn-title">คำในกลุ่มเดียวกัน:</div><div class="syn-list">${synHtml}</div></div>` : ''}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="learnPrev()">← ก่อนหน้า</button>
      <div class="nr-count">${learnIdx+1} / ${learnWords.length}</div>
      <button class="btn btn-red" onclick="learnNext()">ถัดไป →</button>
    </div>
    <button class="btn" style="width:100%;margin-top:10px;" onclick="goHome()">🏠 กลับหน้าหลัก</button>
  `;
}

function learnNext() { if (learnIdx < learnWords.length-1) { learnIdx++; renderLearn(); } }
function learnPrev() { if (learnIdx > 0) { learnIdx--; renderLearn(); } }

// ============ FILL IN BLANK ============
function startFillMode(words) {
  testWords = shuffle(words);
  testIdx = 0; testScore = 0; testWrong = [];
  showScreen('s-test');
  renderFill();
}

function getWrongOpts(correct, all, n) {
  const pool = shuffle(all.filter(w => w.word !== correct.word)).slice(0, n);
  return pool.map(w => w.word);
}

function renderFill() {
  if (testIdx >= testWords.length) { renderEnd(); return; }
  const w = testWords[testIdx];
  const wrongs = getWrongOpts(w, testWords, 3);
  const opts = shuffle([w.word, ...wrongs]);
  const pct = (testIdx/testWords.length*100).toFixed(0);

  document.getElementById('s-test').innerHTML = `
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-box-n sb-n">${testIdx+1}/${testWords.length}</div><div class="sb-l">ข้อ</div></div>
      <div class="stat-box"><div class="sb-n" style="color:#5dde5d">${testScore}</div><div class="sb-l">ถูก</div></div>
      <div class="stat-box"><div class="sb-n" style="color:#e94560">${testIdx-testScore}</div><div class="sb-l">ผิด</div></div>
    </div>
    <div class="q-card">
      <div class="q-group">${w.group}</div>
      <div class="q-sentence">${w.sentence.replace('___','<span class="q-blank">___</span>')}</div>
      <div class="q-thai">${w.sentenceTh}</div>
      <div class="opts-grid">
        ${opts.map(o => `<button class="opt" onclick="chooseFill('${o}','${w.word}',this)">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="btn btn-red" id="nextBtn" style="display:none;width:100%" onclick="testNext('fill')">ถัดไป →</button>
    </div>
    <button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>
  `;
}

function chooseFill(val, ans, el) {
  document.querySelectorAll('.opt').forEach(b => { b.disabled=true; if(b.textContent===ans) b.classList.add('correct'); else if(b===el && val!==ans) b.classList.add('wrong'); });
  const correct = val === ans;
  if (correct) testScore++;
  else testWrong.push(testWords[testIdx]);
  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (correct?'fb-ok':'fb-no');
  fb.innerHTML = `<div class="fb-word">${correct?'✓ ถูกต้อง!':'✗ คำตอบที่ถูกคือ: '+ans}</div><div class="fb-thai">${testWords[testIdx].thai}</div><div class="fb-note">💡 ${testWords[testIdx].note||''}</div>`;
  document.getElementById('nextBtn').style.display='block';
}

function testNext(mode) {
  testIdx++;
  if (mode==='fill') renderFill();
  else if (mode==='mcq') renderMCQ();
}

// ============ MCQ MODE ============
function startMCQMode(words) {
  testWords = shuffle(words);
  testIdx=0; testScore=0; testWrong=[];
  showScreen('s-test');
  renderMCQ();
}

function renderMCQ() {
  if (testIdx >= testWords.length) { renderEnd(); return; }
  const w = testWords[testIdx];
  const wrongs = getWrongOpts(w, testWords, 3);
  const opts = shuffle([{word:w.word,thai:w.thai}, ...wrongs.map(x=>({word:x, thai: testWords.find(t=>t.word===x)?.thai||''}))]);
  const pct = (testIdx/testWords.length*100).toFixed(0);

  document.getElementById('s-test').innerHTML = `
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="stats-row">
      <div class="stat-box"><div class="sb-n">${testIdx+1}/${testWords.length}</div><div class="sb-l">ข้อ</div></div>
      <div class="stat-box"><div class="sb-n" style="color:#5dde5d">${testScore}</div><div class="sb-l">ถูก</div></div>
      <div class="stat-box"><div class="sb-n" style="color:#e94560">${testIdx-testScore}</div><div class="sb-l">ผิด</div></div>
    </div>
    <div class="q-card">
      <div class="q-group">${w.group}</div>
      <div style="font-size:13px;color:#888;margin-bottom:6px;">คำภาษาไทยคือ:</div>
      <div style="font-size:22px;font-weight:800;color:#f5a623;margin-bottom:16px;">${w.thai}</div>
      <div class="opts-grid">
        ${opts.map(o => `<button class="opt" onclick="chooseMCQ('${o.word}','${w.word}',this)">${o.word}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="btn btn-red" id="nextBtn" style="display:none;width:100%" onclick="testNext('mcq')">ถัดไป →</button>
    </div>
    <button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>
  `;
}

function chooseMCQ(val, ans, el) {
  document.querySelectorAll('.opt').forEach(b => { b.disabled=true; if(b.textContent===ans) b.classList.add('correct'); else if(b===el&&val!==ans) b.classList.add('wrong'); });
  const correct = val===ans;
  if(correct) testScore++; else testWrong.push(testWords[testIdx]);
  const fb=document.getElementById('fb');
  fb.className='feedback show '+(correct?'fb-ok':'fb-no');
  fb.innerHTML=`<div class="fb-word">${correct?'✓ ถูกต้อง!':'✗ คำตอบที่ถูกคือ: '+ans}</div><div class="fb-note">💡 ${testWords[testIdx].note||''}</div>`;
  document.getElementById('nextBtn').style.display='block';
}

// ============ FLASHCARD ============
function startFlashMode(words) {
  fcWords = shuffle(words);
  fcIdx=0; fcFlipped=false;
  showScreen('s-test');
  renderFlash();
}

function renderFlash() {
  if (fcIdx >= fcWords.length) { renderFlashEnd(); return; }
  const w = fcWords[fcIdx];
  document.getElementById('s-test').innerHTML = `
    <div style="font-size:13px;color:#888;margin-bottom:12px;text-align:center;">${fcIdx+1} / ${fcWords.length} — คลิกการ์ดเพื่อพลิก</div>
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="fc-front" id="fc-content">
        <div class="fc-word">${w.word}</div>
        <div class="fc-pos">${w.pos} | ${w.group}</div>
      </div>
      <div class="fc-hint">👆 คลิกเพื่อดูความหมาย</div>
    </div>
    <div class="rating-row" id="ratingRow" style="display:none;">
      <button class="rating-btn rb-hard" onclick="rateCard('hard')">😓 ยาก</button>
      <button class="rating-btn rb-ok" onclick="rateCard('ok')">🙂 พอได้</button>
      <button class="rating-btn rb-easy" onclick="rateCard('easy')">😄 ง่าย</button>
    </div>
    <button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>
  `;
}

function flipCard() {
  if (fcFlipped) return;
  fcFlipped = true;
  const w = fcWords[fcIdx];
  document.getElementById('fc-content').innerHTML = `
    <div class="fc-back">
      <div class="fc-thai">${w.thai}</div>
      <div class="fc-sent">${w.sentence.replace('___',`<strong>${w.word}</strong>`)}</div>
      ${w.note?`<div style="font-size:12px;color:#888;margin-top:8px;">💡 ${w.note}</div>`:''}
    </div>`;
  document.getElementById('ratingRow').style.display='flex';
}

function rateCard(r) {
  if(r==='hard') fcHard.push(fcWords[fcIdx]);
  else if(r==='ok') fcOk.push(fcWords[fcIdx]);
  else fcEasy.push(fcWords[fcIdx]);
  fcIdx++; fcFlipped=false; renderFlash();
}

function renderFlashEnd() {
  document.getElementById('s-test').innerHTML = `
    <div class="end-screen">
      <div class="end-score">🃏</div>
      <div class="end-label">ครบทุกคำแล้ว!</div>

// ============ MATCHING ============
function startMatchMode(words) {
  matchWords = shuffle(words).slice(0,6);
  matchSel=null; matchDone=0;
  showScreen('s-test');
  renderMatch();
}

function renderMatch() {
  const lefts = shuffle(matchWords.map(w=>({id:w.word,text:w.word,type:'en'})));
  const rights = shuffle(matchWords.map(w=>({id:w.word,text:w.thai,type:'th'})));
  let html = `<div style="font-size:13px;color:#888;margin-bottom:12px;">จับคู่คำกับความหมาย</div><div class="match-grid">`;
  const maxLen = Math.max(lefts.length, rights.length);
  for(let i=0;i<maxLen;i++){
    if(lefts[i]) html+=`<div class="match-item" id="ml-${lefts[i].id}" onclick="selectMatch('${lefts[i].id}','en')">${lefts[i].text}</div>`;
    else html+=`<div></div>`;
    if(rights[i]) html+=`<div class="match-item" id="mr-${rights[i].id}" onclick="selectMatch('${rights[i].id}','th')">${rights[i].text}</div>`;
    else html+=`<div></div>`;
  }
  html+=`</div><button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>`;
  document.getElementById('s-test').innerHTML=html;
}

let matchSelId=null, matchSelType=null;
function selectMatch(id,type) {
  const el=document.getElementById(type==='en'?`ml-${id}`:`mr-${id}`);
  if(el.classList.contains('matched')) return;

  if(matchSelId===null){
    matchSelId=id; matchSelType=type;
    el.classList.add('selected');
  } else {
    const prevEl=document.getElementById(matchSelType==='en'?`ml-${matchSelId}`:`mr-${matchSelId}`);
    if(matchSelType!==type && matchSelId===id){
      // Match!
      el.classList.remove('selected'); el.classList.add('matched');
      prevEl.classList.remove('selected'); prevEl.classList.add('matched');
      matchDone++;
      if(matchDone>=matchWords.length){ setTimeout(()=>{ document.getElementById('s-test').innerHTML=`<div class="end-screen"><div class="end-score">🎉</div><div class="end-label">จับคู่ครบทุกคำ!</div><button class="btn btn-red" style="width:100%;margin-bottom:8px;" onclick="startMatchMode(getSelectedWords())">🔄 เล่นใหม่</button><button class="btn" style="width:100%;" onclick="goHome()">🏠 กลับ</button></div>`;},300); }
    } else {
      // Wrong
      el.classList.add('wrong-flash'); prevEl.classList.add('wrong-flash');
      setTimeout(()=>{ el.classList.remove('wrong-flash','selected'); prevEl.classList.remove('wrong-flash','selected'); },500);
    }
    matchSelId=null; matchSelType=null;
  }
}

// ============ ORDER MODE ============
function startOrderMode(words) {
  const groups = getGroups().filter(g => selGroups.includes(g.gid) && g.words.length >= 2);
  if(groups.length===0){ alert('ต้องเลือกหมวดที่มีคำซ้อนระดับความแรง'); return; }
  const g = groups[Math.floor(Math.random()*groups.length)];
  const sorted = [...g.words].sort((a,b)=>a.level-b.level);
  const shuffledItems = shuffle(sorted.map((w,i)=>({...w, correctPos:i})));
  showScreen('s-test');
  renderOrder(shuffledItems, sorted);
}

function renderOrder(items, sorted) {
  let html=`<div style="font-size:13px;color:#888;margin-bottom:12px;">ลากเรียงคำจากความรู้สึกเบาสุด → แรงสุด</div><div class="order-items" id="orderList">`;
  items.forEach((w,i)=>{
    html+=`<div class="order-item" draggable="true" id="oi-${i}" data-idx="${i}">
      <div class="order-num">${i+1}</div>
      <div><div style="font-weight:700">${w.word}</div><div style="font-size:12px;color:#888">${w.thai}</div></div>
    </div>`;
  });
  html+=`</div><button class="check-btn" onclick="checkOrder()">✓ ตรวจคำตอบ</button>`;
  html+=`<div id="orderFb" style="display:none;"></div>`;
  html+=`<button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>`;
  document.getElementById('s-test').innerHTML=html;
  window._orderCorrect=sorted;
  window._orderItems=items;
  initDrag();
}

function initDrag(){
  let dragSrc=null;
  document.querySelectorAll('.order-item').forEach(el=>{
    el.addEventListener('dragstart',function(){dragSrc=this;this.classList.add('dragging');});
    el.addEventListener('dragend',function(){this.classList.remove('dragging');});
    el.addEventListener('dragover',function(e){e.preventDefault();});
    el.addEventListener('drop',function(e){
      e.preventDefault();
      if(dragSrc!==this){
        const list=document.getElementById('orderList');
        const items=[...list.children];
        const srcIdx=items.indexOf(dragSrc);
        const dstIdx=items.indexOf(this);
        if(srcIdx<dstIdx) list.insertBefore(dragSrc,this.nextSibling);
        else list.insertBefore(dragSrc,this);
      }
    });
  });
}

function checkOrder(){
  const list=document.getElementById('orderList');
  const currentOrder=[...list.children].map(el=>el.id.replace('oi-',''));
  const correct=window._orderCorrect;
  const items=window._orderItems;
  let allCorrect=true;
  [...list.children].forEach((el,i)=>{
    const w=items[parseInt(el.dataset.idx)];
    if(w.word===correct[i].word){ el.classList.add('correct-pos'); }
    else { el.classList.add('wrong-pos'); allCorrect=false; }
  });
  const fb=document.getElementById('orderFb');
  fb.style.display='block';
  fb.innerHTML=allCorrect?
    `<div style="background:#1a3a1a;border-radius:10px;padding:12px;color:#5dde5d;font-weight:700;">✓ ถูกต้องทั้งหมด!</div>`:
    `<div style="background:#3a1a1a;border-radius:10px;padding:12px;color:#eee;">คำเรียงที่ถูก: ${correct.map(w=>`<strong>${w.word}</strong>`).join(' → ')}</div>`;
}

let clSelGroups=[], clQueue=[], clIdx=0;
let clTimeLeft=60, clTimerInterval=null;
let clFound=[], clTotalScore=0, clRoundResults=[];

function startClusterMode(words){
  // Build cluster selection screen
  const test=document.getElementById('s-test');
  let html=`<div style="margin-bottom:16px;"><div style="font-family:'Fredoka One',cursive;font-size:20px;color:#e94560;margin-bottom:4px;">Cluster Dump</div>
  <div style="font-size:13px;color:#888;margin-bottom:14px;">พิมพ์ synonym ให้ได้มากที่สุดใน 60 วินาที</div>

    html+=`<div class="group-card" id="clg-${i}" onclick="toggleCl(${i})" style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:14px;font-weight:700;color:#eee;">${c.thai}</div><div style="font-size:11px;color:#888;">${c.words.length} คำ</div></div>

  <button class="btn btn-red" id="clStartBtn" onclick="beginCluster()" disabled style="width:100%;margin-bottom:8px;">▶ เริ่ม Cluster Dump</button>

function toggleCl(i){
  const idx=clSelGroups.indexOf(i);
  if(idx>=0){clSelGroups.splice(idx,1);document.getElementById('clg-'+i).classList.remove('selected');document.getElementById('clgck-'+i).style.display='none';}
  else{clSelGroups.push(i);document.getElementById('clg-'+i).classList.add('selected');document.getElementById('clgck-'+i).style.display='block';}
  document.getElementById('clStartBtn').disabled=clSelGroups.length===0;
}

function beginCluster(){
  clQueue=clSelGroups.map(i=>CLUSTERS[i]);
  clIdx=0; clTotalScore=0; clRoundResults=[];
  startClRound();
}

function startClRound(){
  if(clIdx>=clQueue.length){showClResult();return;}
  const c=clQueue[clIdx];
  clFound=[]; clTimeLeft=60;
  const tagColors={formal:'hp-formal',spoken:'hp-spoken',literary:'hp-literary',strong:'hp-strong',mild:'hp-mild'};
  const tagLabels={formal:'formal',spoken:'spoken',literary:'literary',strong:'แรง',mild:'เบา'};
  const allTags=[...new Set(c.words.flatMap(w=>w.tags))];

  document.getElementById('s-test').innerHTML=`
    <div class="game-header">
      <div class="timer-ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle class="ring-bg" cx="28" cy="28" r="22"/>
          <circle class="ring-fill" id="clRing" cx="28" cy="28" r="22" style="stroke-dashoffset:0"/>
        </svg>
        <div class="timer-num" id="clTimer">60</div>
      </div>
      <div class="game-meta">
        <div class="gm-thai">${c.thai}</div>
        <div class="gm-hint">${c.hint}</div>
      </div>
      <div class="cl-score-badge">
        <div style="font-size:20px;font-weight:800;color:#5dde5d;" id="clScore">${clTotalScore}</div>
        <div style="font-size:11px;color:#888;">pts</div>
      </div>
    </div>
    <div class="cl-input-row">
      <input type="text" id="clInput" placeholder="พิมพ์ synonym อังกฤษ..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button onclick="clSkip()">ข้าม</button>
    </div>
    <div class="found-grid" id="clFound"></div>
    <div class="hint-section">
      <div class="hint-title">ใบ้ระดับ:</div>
      <div class="hint-row">${allTags.map(t=>`<span class="hp ${tagColors[t]||''}">${tagLabels[t]||t}</span>`).join('')}</div>
    </div>
    <button class="reveal-btn" onclick="clReveal()">แสดงคำที่เหลือ</button>
    <button class="btn" style="width:100%;margin-top:8px;" onclick="goHome()">🏠 กลับ</button>
  `;

  const inp=document.getElementById('clInput');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();clSubmit();}});
  inp.addEventListener('input',function(){
    const v=this.value.trim().toLowerCase();
    const c2=clQueue[clIdx];
    if(c2.words.some(w=>w.w===v&&!clFound.includes(w.w))){this.className='cl-ok';}
    else this.className='';
  });
  inp.focus();

  clearInterval(clTimerInterval);
  clTimerInterval=setInterval(clTick,1000);
}

function clTick(){
  clTimeLeft--;
  document.getElementById('clTimer').textContent=clTimeLeft;
  const off=138*(1-clTimeLeft/60);
  document.getElementById('clRing').style.strokeDashoffset=off;
  if(clTimeLeft<=10) document.getElementById('clRing').style.stroke='#e94560';
  if(clTimeLeft<=0){clearInterval(clTimerInterval);clEndRound();}
}

function clSubmit(){
  const inp=document.getElementById('clInput');
  const val=inp.value.trim().toLowerCase();
  if(!val) return;
  const c=clQueue[clIdx];
  const match=c.words.find(w=>w.w===val&&!clFound.includes(w.w));
  if(match){
    clFound.push(match.w);
    const pts=match.tags.includes('strong')?30:(match.tags.includes('formal')||match.tags.includes('literary'))?20:10;
    clTotalScore+=pts;
    document.getElementById('clScore').textContent=clTotalScore;
    const p=document.createElement('span');
    p.className='fp fp-found'; p.textContent=match.w;
    document.getElementById('clFound').appendChild(p);
    inp.value=''; inp.className='';
    if(clFound.length>=c.words.length){clearInterval(clTimerInterval);setTimeout(clEndRound,300);}
  } else {
    inp.classList.add('cl-wrong');
    setTimeout(()=>inp.classList.remove('cl-wrong'),300);
    inp.select();
  }
}

function clSkip(){clearInterval(clTimerInterval);clEndRound();}
function clReveal(){
  clearInterval(clTimerInterval);
  const c=clQueue[clIdx];
  c.words.forEach(w=>{
    if(!clFound.includes(w.w)){
      const p=document.createElement('span');
      p.className='fp fp-missed'; p.textContent=w.w;
      document.getElementById('clFound').appendChild(p);
    }
  });
  setTimeout(clEndRound,600);
}

function clEndRound(){
  clearInterval(clTimerInterval);
  const c=clQueue[clIdx];
  clRoundResults.push({cluster:c,found:[...clFound]});
  clIdx++;
  setTimeout(startClRound,300);
}

function showClResult(){
  const total=clRoundResults.reduce((s,r)=>s+r.cluster.words.length,0);
  const found=clRoundResults.reduce((s,r)=>s+r.found.length,0);
  const pct=Math.round(found/total*100);
  let html=`<div class="cl-final">
    <div class="cl-final-score">${clTotalScore} pts</div>
    <div class="cl-final-label">นึกออก ${found}/${total} คำ (${pct}%) — ${pct>=80?'เยี่ยมมาก! 🔥':pct>=60?'ดีมาก! 👍':'ฝึกต่อนะครับ 💪'}</div>
  </div>`;
  clRoundResults.forEach(r=>{
    html+=`<div class="cl-result-card"><div class="cl-rc-thai">${r.cluster.thai}</div>`;
    r.cluster.words.forEach(w=>{
      const ok=r.found.includes(w.w);
      html+=`<div class="cl-rw ${ok?'cl-rw-found':'cl-rw-missed'}">
        <div class="cl-rw-word">${ok?'✓':'✗'} ${w.w}</div>
        <div class="cl-rw-note">${w.note} · ${w.tags.join(', ')}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn" style="flex:1;" onclick="goHome()">🏠 กลับ</button>
    <button class="btn btn-red" style="flex:1;" onclick="beginCluster()">🔄 เล่นอีกครั้ง</button>
  </div>`;
  document.getElementById('s-test').innerHTML=html;
}

// ============ INIT ============
buildHome();
</script>
</body>
</html>
