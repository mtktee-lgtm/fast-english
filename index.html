<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fast English Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f1a;--bg2:#16213e;--bg3:#1a1a2e;
  --red:#e94560;--red2:#c73652;
  --green:#1D9E75;--green2:#0F6E56;
  --gold:#f5a623;--blue:#0f3460;--blue2:#1a4a7a;
  --text:#eee;--text2:#aaa;--text3:#666;
  --border:#1e2d4a;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ===== TOP NAV ===== */
#topnav{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  display:flex;align-items:center;
  height:52px;
  position:sticky;top:0;z-index:100;
  gap:8px;
}
.tn-logo{font-family:'Fredoka One',cursive;font-size:18px;color:var(--red);flex:1;white-space:nowrap;}
.tn-btn{background:none;border:none;color:var(--text2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.tn-btn:hover,.tn-btn.act{background:var(--blue);color:var(--text);}
.tn-btn.act{color:var(--red);}

/* ===== LAYOUT ===== */
#layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);}

/* ===== SIDEBAR (desktop) ===== */
#sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:12px 8px;
}
.sb-section{margin-bottom:16px;}
.sb-label{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:6px;}
.sb-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:8px;cursor:pointer;
  font-size:13px;color:var(--text2);font-weight:600;
  transition:all 0.15s;
}
.sb-item:hover{background:var(--blue);color:var(--text);}
.sb-item.sel{background:var(--blue);color:var(--red);}
.sb-badge{background:var(--blue2);color:var(--text2);font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;}
.sb-item.sel .sb-badge{background:var(--red);color:white;}

/* ===== MAIN CONTENT ===== */
#content{flex:1;overflow-y:auto;padding:16px;}

/* ===== HOME / GROUP PICKER ===== */
.page-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--red);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:16px;}

.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
.gc{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all 0.15s;position:relative;}
.gc:hover{border-color:var(--green);transform:translateY(-1px);}
.gc.sel{border-color:var(--red);background:#1a0a14;}
.gc-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;}
.gc-count{font-size:11px;color:var(--text2);}
.gc-ck{position:absolute;top:6px;right:8px;font-size:13px;display:none;color:var(--red);}
.gc.sel .gc-ck{display:block;}

/* ===== MODE PICKER ===== */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
@media(max-width:480px){.mode-grid{grid-template-columns:repeat(2,1fr);}}
.mc{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all 0.15s;}
.mc:hover{border-color:var(--gold);}
.mc.sel{border-color:var(--gold);background:#1a1200;}
.mc-icon{font-size:22px;margin-bottom:4px;}
.mc-name{font-size:13px;font-weight:700;color:var(--text);}
.mc-desc{font-size:11px;color:var(--text2);margin-top:2px;}

.start-btn{width:100%;padding:13px;background:var(--red);border:none;color:white;font-family:'Fredoka One',cursive;font-size:18px;border-radius:10px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:var(--red2);}
.start-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;}
.sel-info{font-size:12px;color:var(--text2);text-align:center;margin-top:8px;}

/* ===== LEARN CARD ===== */
.lc{background:var(--bg2);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid var(--border);}
.lc-group{font-size:11px;color:var(--red);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.lc-word{font-size:30px;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.2;}
.lc-pos{font-size:12px;color:var(--text3);margin-bottom:10px;}
.lc-thai{font-size:20px;color:var(--gold);font-weight:700;margin-bottom:10px;}

.lc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tag{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;}
.tag-formal{background:#0c2a4a;color:#7ab8f0;}
.tag-spoken{background:#3a2000;color:#f5c060;}
.tag-literary{background:#2a1a4a;color:#c0b0f0;}
.tag-strong{background:#3a0a0a;color:#f07070;}
.tag-mild{background:#0a2a1a;color:#70d0a0;}

.lc-sentence{background:var(--blue);border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.lc-sentence .en{font-size:15px;color:var(--text);margin-bottom:5px;line-height:1.6;}
.lc-sentence .highlight{color:#7dff7d;font-weight:800;}
.lc-sentence .th{font-size:13px;color:var(--text2);}

/* Collocation box */
.lc-colloc{background:#0a1f10;border:1px solid #1a4a2a;border-radius:8px;padding:10px 14px;margin-bottom:10px;}
.lc-colloc-title{font-size:11px;color:#5dde5d;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.lc-colloc-content{font-size:13px;color:#a0dda0;line-height:1.7;}
.colloc-key{color:#7dff7d;font-weight:800;background:rgba(125,255,125,0.1);padding:1px 5px;border-radius:4px;}

.lc-note{background:var(--bg3);border-left:3px solid var(--red);padding:10px 14px;font-size:13px;color:var(--text2);border-radius:0 8px 8px 0;margin-bottom:14px;line-height:1.6;}

.syn-row{margin-bottom:16px;}
.syn-title{font-size:11px;color:var(--text3);margin-bottom:6px;}
.syn-pills{display:flex;flex-wrap:wrap;gap:6px;}
.syn-pill{background:var(--blue);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--text2);cursor:default;transition:all 0.15s;}
.syn-pill.cur{background:var(--red);color:white;}
.syn-pill:hover{background:var(--blue2);}

.learn-nav{display:flex;align-items:center;gap:8px;}
.learn-nav .ln-count{flex:1;text-align:center;font-size:13px;color:var(--text2);}
.btn{background:var(--blue);border:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:10px 18px;border-radius:8px;cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--blue2);}
.btn-red{background:var(--red);}
.btn-red:hover{background:var(--red2);}
.btn-green{background:var(--green);}
.btn-green:hover{background:var(--green2);}

/* ===== TEST AREA ===== */
.test-header{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);
  padding:10px 14px;
  border-radius:10px;
  margin-bottom:12px;
  position:sticky;top:0;z-index:10;
}
.th-stat{text-align:center;min-width:44px;}
.th-n{font-size:18px;font-weight:800;}
.th-l{font-size:10px;color:var(--text2);}
.th-progress{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.th-fill{height:100%;background:var(--red);border-radius:3px;transition:width 0.4s;}

.q-card{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.q-group{font-size:11px;color:var(--red);font-weight:800;text-transform:uppercase;margin-bottom:6px;}
.q-sentence{font-size:16px;line-height:1.7;margin-bottom:5px;}
.q-blank{display:inline-block;border-bottom:2px solid var(--red);min-width:80px;text-align:center;color:var(--red);font-weight:800;padding:0 6px;}
.q-thai{font-size:13px;color:var(--text2);margin-bottom:14px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
@media(max-width:380px){.opts-grid{grid-template-columns:1fr;}}
.opt{background:var(--blue);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;cursor:pointer;color:var(--text);text-align:left;transition:all 0.15s;font-family:'Nunito',sans-serif;font-weight:600;}
.opt:hover{border-color:var(--red);}
.opt.correct{background:#0a2a0a;border-color:#5dde5d;color:#5dde5d;}
.opt.wrong{background:#2a0a0a;border-color:var(--red);color:var(--red);}
.opt:disabled{cursor:default;}

.feedback{border-radius:8px;padding:10px 14px;margin-bottom:10px;display:none;font-size:13px;line-height:1.6;}
.feedback.show{display:block;}
.fb-ok{background:#0a2a0a;border-left:3px solid #5dde5d;}
.fb-no{background:#2a0a0a;border-left:3px solid var(--red);}
.fb-word{font-size:15px;font-weight:800;margin-bottom:4px;}
.fb-thai{color:var(--gold);margin-bottom:4px;}
.fb-note{color:var(--text2);}
.fb-colloc{color:#a0dda0;margin-top:4px;}

/* ===== FLASHCARD ===== */
.fc-wrap{perspective:1000px;margin-bottom:14px;cursor:pointer;}
.fc-inner{position:relative;transform-style:preserve-3d;transition:transform 0.5s;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:28px 20px;min-height:180px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;backface-visibility:hidden;
}
.fc-back{position:absolute;inset:0;transform:rotateY(180deg);}
.fc-word{font-size:34px;font-weight:800;color:var(--text);margin-bottom:6px;}
.fc-pos{font-size:13px;color:var(--text3);}
.fc-thai{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.fc-sent{font-size:13px;color:var(--text2);line-height:1.6;max-width:400px;}
.fc-hint{font-size:12px;color:var(--text3);margin-top:10px;}
.rate-row{display:flex;gap:8px;margin-bottom:12px;}
.rb{flex:1;padding:10px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.rb-hard{background:#3a0a0a;color:var(--red);}
.rb-ok{background:#3a2000;color:var(--gold);}
.rb-easy{background:#0a2a0a;color:#5dde5d;}

/* ===== MATCH ===== */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.mi{background:var(--blue);border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--text);text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-weight:600;}
.mi:hover{border-color:var(--red);}
.mi.msel{border-color:var(--gold);background:#1a1200;color:var(--gold);}
.mi.matched{border-color:#5dde5d;background:#0a2a0a;color:#5dde5d;cursor:default;}
.mi.mwrong{border-color:var(--red);background:#2a0a0a;}

/* ===== ORDER ===== */
.oi{background:var(--blue);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;cursor:grab;display:flex;align-items:center;gap:10px;margin-bottom:7px;transition:all 0.15s;}
.oi:hover{border-color:var(--gold);}
.oi-num{width:22px;height:22px;background:var(--blue2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.oi.correct-pos{border-color:#5dde5d;background:#0a2a0a;}
.oi.wrong-pos{border-color:var(--red);background:#2a0a0a;}

/* ===== CLUSTER DUMP ===== */
.cl-header{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:12px;position:sticky;top:0;z-index:10;}
.timer-ring{position:relative;width:52px;height:52px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
.ring-fill{fill:none;stroke:#5dde5d;stroke-width:4;stroke-linecap:round;stroke-dasharray:138;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;}
.cl-meta{flex:1;}
.cl-thai{font-size:20px;font-weight:800;}
.cl-hint{font-size:11px;color:var(--text2);}
.cl-score{background:var(--blue);border-radius:8px;padding:6px 12px;text-align:center;}
.cl-score-n{font-size:18px;font-weight:800;color:#5dde5d;}
.cl-score-l{font-size:10px;color:var(--text2);}
.cl-input-row{display:flex;gap:8px;margin-bottom:10px;}
.cl-inp{flex:1;background:rgba(255,255,255,0.08);border:2px solid var(--border);border-radius:8px;color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;padding:8px 12px;outline:none;}
.cl-inp:focus{border-color:#5dde5d;}
.cl-inp.cl-ok{border-color:#5dde5d;background:rgba(93,222,93,0.08);}
.cl-inp.cl-err{border-color:var(--red);animation:shk 0.3s;}
.cl-skip{background:var(--blue);border:none;color:var(--text2);border-radius:8px;padding:0 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;}
.found-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:28px;}
.fp{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.fp-ok{background:#0a2a0a;color:#5dde5d;}
.fp-miss{background:#2a0a0a;color:var(--red);}
.hint-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.hp{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;}
.hp-formal{background:#0c2a4a;color:#7ab8f0;}
.hp-spoken{background:#3a2000;color:#f5c060;}
.hp-literary{background:#2a1a4a;color:#c0b0f0;}
.hp-strong{background:#3a0a0a;color:#f07070;}
.hp-mild{background:#0a2a1a;color:#70d0a0;}

/* ===== END / RESULT ===== */
.end-screen{text-align:center;padding:24px 0;}
.end-score{font-size:52px;font-weight:800;color:var(--red);font-family:'Fredoka One',cursive;}
.end-label{font-size:15px;color:var(--text2);margin-bottom:18px;}
.wr-item{padding:10px 0;border-bottom:1px solid var(--border);}
.wr-word{font-size:14px;font-weight:800;color:var(--red);}
.wr-thai{font-size:13px;color:var(--gold);}
.wr-note{font-size:12px;color:var(--text2);margin-top:2px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}

/* ===== MOBILE BOTTOM NAV ===== */
#botnav{
  display:none;
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:8px 0 env(safe-area-inset-bottom);
  position:sticky;bottom:0;z-index:100;
}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text2);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;padding:4px 0;cursor:pointer;}
.bn-item.act{color:var(--red);}
.bn-icon{font-size:20px;}

@media(max-width:640px){
  #sidebar{display:none;}
  #botnav{display:flex;}
  #layout{height:calc(100vh - 52px - 60px);}
  .group-grid{grid-template-columns:repeat(2,1fr);}
}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>

<div id="topnav">
  <div class="tn-logo">📚 Fast English</div>
  <button class="tn-btn act" id="tnb-home" onclick="showPage('home')">🏠 หลัก</button>
  <button class="tn-btn" id="tnb-learn" onclick="quickLearn()">📖 เรียน</button>
  <button class="tn-btn" id="tnb-test" onclick="showPage('home')">✏️ ทดสอบ</button>
</div>

<div id="layout">
  <!-- SIDEBAR desktop -->
  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-label">หมวดคำ</div>
      <div id="sbGroups"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">โหมด</div>
      <div id="sbModes">
        <div class="sb-item" id="sbm-learn" onclick="selSbMode('learn')"><span>📖 เรียน</span></div>
        <div class="sb-item" id="sbm-fill" onclick="selSbMode('fill')"><span>✏️ Fill in Blank</span></div>
        <div class="sb-item" id="sbm-mcq" onclick="selSbMode('mcq')"><span>🎯 MCQ</span></div>
        <div class="sb-item" id="sbm-flash" onclick="selSbMode('flash')"><span>🃏 Flashcard</span></div>
        <div class="sb-item" id="sbm-match" onclick="selSbMode('match')"><span>🔗 Matching</span></div>
        <div class="sb-item" id="sbm-order" onclick="selSbMode('order')"><span>📊 เรียงระดับ</span></div>
        <div class="sb-item" id="sbm-cluster" onclick="selSbMode('cluster')"><span>⚡ Cluster Dump</span></div>
      </div>
    </div>
    <button class="start-btn" id="sbStartBtn" style="margin-top:8px;" onclick="startSelected()" disabled>▶ เริ่ม</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="content">
    <div id="page-home"></div>
    <div id="page-learn" style="display:none;"></div>
    <div id="page-test" style="display:none;"></div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<div id="botnav">
  <button class="bn-item act" id="bnb-home" onclick="showPage('home')"><span class="bn-icon">🏠</span>หลัก</button>
  <button class="bn-item" id="bnb-learn" onclick="quickLearn()"><span class="bn-icon">📖</span>เรียน</button>
  <button class="bn-item" id="bnb-test" onclick="showPage('home')"><span class="bn-icon">✏️</span>ทดสอบ</button>
</div>

<script>
const VOCAB = [
  // ===== 1. FEELING — ประหลาดใจ =====

   sentence:"I was ___ at the news — no one had told me about the promotion.",
   sentenceTh:"ฉันประหลาดใจกับข่าวนั้น — ไม่มีใครบอกฉันเรื่องการเลื่อนตำแหน่งเลย",
   note:"ใช้ได้ทุกบริบท เป็น base word ของหมวดนี้",colloc:"surprise + sb / come as a surprise / surprise attack",synonyms:["surprise","amaze","astonish","astound","startle","puzzle","shock"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"amaze",pos:"v",thai:"ประหลาดใจจนชื่นชม",level:2,levelLabel:"กลาง",
   sentence:"The young pianist ___ the audience with her flawless performance.",
   sentenceTh:"นักเปียโนสาวทำให้ผู้ชมทึ่งด้วยการแสดงที่สมบูรณ์แบบ",
   note:"amazed = ประหลาดใจในเชิงชื่นชม / amazing = น่าทึ่ง",colloc:"amaze + sb / amazed by/at sth / amazing performance",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"astonish",pos:"v",thai:"ทำให้ตกใจ จนแทบไม่เชื่อ",level:2,levelLabel:"กลาง",
   sentence:"It ___ me that anyone could eat that much in one sitting.",
   sentenceTh:"มันทำให้ฉันตกใจที่มีคนสามารถกินได้มากขนาดนั้นในมื้อเดียว",
   note:"astonishment (n) / astonishing (adj) — แรงกว่า amaze เล็กน้อย",colloc:"astonish + sb / astonished at/by sth",synonyms:["surprise","amaze","astonish","astound","startle"]},
  {group:"1. Feeling — ประหลาดใจ",gid:"f_surprise",word:"astound",pos:"v",thai:"ตะลึงงัน พูดไม่ออก",level:3,levelLabel:"แรงมาก",

// ===== UTILS =====
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function getGroups(){
  const map={};
  VOCAB.forEach(v=>{
    if(!map[v.gid]) map[v.gid]={name:v.group,gid:v.gid,words:[]};
    map[v.gid].words.push(v);
  });
  return Object.values(map);
}

function getSelectedWords(){return VOCAB.filter(v=>selGroups.includes(v.gid));}

function getWrongOpts(correct,all,n){
  let pool=all.filter(w=>w.word!==correct.word);
  if(pool.length<n){const extra=VOCAB.filter(v=>v.word!==correct.word&&!pool.find(p=>p.word===v.word));pool=pool.concat(extra);}
  return shuffle(pool).slice(0,n).map(w=>w.word);
}

// ===== PAGES =====
function showPage(p){
  ['home','learn','test'].forEach(x=>{document.getElementById('page-'+x).style.display=x===p?'block':'none';});
  ['home','learn','test'].forEach(x=>{
    const tb=document.getElementById('tnb-'+x);
    const bb=document.getElementById('bnb-'+x);
    if(tb) tb.classList.toggle('act',x===p);
    if(bb) bb.classList.toggle('act',x===p);
  });
}

// ===== HOME =====
function buildHome(){
  const groups=getGroups();
  // Sidebar groups
  let sbHtml='';
  groups.forEach(g=>{
    const sel=selGroups.includes(g.gid);
    sbHtml+=`<div class="sb-item${sel?' sel':''}" onclick="toggleGroup('${g.gid}',this)">
      <span style="font-size:12px;">${g.name.split('—').pop().trim()}</span>
      <span class="sb-badge">${g.words.length}</span>
    </div>`;
  });
  document.getElementById('sbGroups').innerHTML=sbHtml;

  // Main home page
  let html=`<div class="page-title">Fast English Vocab Trainer</div>
  <div class="page-sub">เลือกหมวด + โหมด แล้วกด เริ่ม</div>
  <div class="group-grid" id="groupGrid">`;
  groups.forEach(g=>{
    const sel=selGroups.includes(g.gid);
    html+=`<div class="gc${sel?' sel':''}" onclick="toggleGroup('${g.gid}',null)">
      <div class="gc-ck">✓</div>
      <div class="gc-name">${g.name}</div>
      <div class="gc-count">${g.words.length} คำ</div>
    </div>`;
  });
  html+=`</div>
  <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;">โหมด:</div>
  <div class="mode-grid">
    <div class="mc${selMode==='learn'?' sel':''}" onclick="selModeClick('learn')"><div class="mc-icon">📖</div><div class="mc-name">เรียน</div><div class="mc-desc">อ่าน+อธิบาย</div></div>
    <div class="mc${selMode==='fill'?' sel':''}" onclick="selModeClick('fill')"><div class="mc-icon">✏️</div><div class="mc-name">Fill in Blank</div><div class="mc-desc">เติมประโยค</div></div>
    <div class="mc${selMode==='mcq'?' sel':''}" onclick="selModeClick('mcq')"><div class="mc-icon">🎯</div><div class="mc-name">MCQ</div><div class="mc-desc">4 ตัวเลือก</div></div>
    <div class="mc${selMode==='flash'?' sel':''}" onclick="selModeClick('flash')"><div class="mc-icon">🃏</div><div class="mc-name">Flashcard</div><div class="mc-desc">พลิกดูคำ</div></div>
    <div class="mc${selMode==='match'?' sel':''}" onclick="selModeClick('match')"><div class="mc-icon">🔗</div><div class="mc-name">Matching</div><div class="mc-desc">จับคู่</div></div>
    <div class="mc${selMode==='cluster'?' sel':''}" onclick="selModeClick('cluster')"><div class="mc-icon">⚡</div><div class="mc-name">Cluster Dump</div><div class="mc-desc">60วิ synonym</div></div>
  </div>
  <button class="start-btn" id="mainStartBtn" onclick="startSelected()" ${selGroups.length===0||!selMode?'disabled':''}>▶ เริ่มเลย!</button>
  <div class="sel-info" id="selInfo">${selGroups.length>0&&selMode?`เลือก ${selGroups.length} หมวด · ${getSelectedWords().length} คำ · โหมด ${selMode}`:'เลือกหมวดและโหมดก่อน'}</div>`;

  document.getElementById('page-home').innerHTML=html;
  updateSbStart();
}

function toggleGroup(gid,el){
  const ix=selGroups.indexOf(gid);
  if(ix>=0) selGroups.splice(ix,1); else selGroups.push(gid);
  buildHome();
}

function selModeClick(m){selMode=m;buildHome();}
function selSbMode(m){selMode=m;buildHome();}

function updateSbStart(){
  const btn=document.getElementById('sbStartBtn');
  if(btn) btn.disabled=selGroups.length===0||!selMode;
}

function startSelected(){
  const words=getSelectedWords();
  if(words.length===0||!selMode) return;
  if(selMode==='learn') startLearn(words);
  else if(selMode==='fill') startFill(words);
  else if(selMode==='mcq') startMCQ(words);
  else if(selMode==='flash') startFlash(words);
  else if(selMode==='match') startMatch(words);
  else if(selMode==='order') startOrder(words);
  else if(selMode==='cluster') startClusterPick();
}

function quickLearn(){
  if(selGroups.length===0){showPage('home');return;}
  startLearn(getSelectedWords());
}

// ===== LEARN =====
function startLearn(words){
  learnWords=words; learnIdx=0;
  showPage('learn');
  document.getElementById('tnb-learn').classList.add('act');
  renderLearn();
}

function renderLearn(){
  const w=learnWords[learnIdx];
  const sameGroup=VOCAB.filter(v=>v.gid===w.gid);
  const levelColors={1:'mild',2:'formal',3:'strong'};
  const tagMap={formal:'tag-formal',spoken:'tag-spoken',literary:'tag-literary',strong:'tag-strong',mild:'tag-mild'};

  // Build highlighted sentence
  const sentHtml=w.sentence.replace('___',`<span class="highlight">${w.word}</span>`);

  // Build colloc HTML with highlighted keywords
  let cHtml='';
  if(w.colloc){
    cHtml=w.colloc.split('/').map(c=>{
      const parts=c.trim().split('+');
      return parts.map((p,i)=>i===0?`<span class="colloc-key">${p.trim()}</span>`:` + ${p.trim()}`).join('');
    }).join('<br>');
  }

  const tags=[];
  if(w.levelLabel) tags.push(`<span class="tag tag-${levelColors[w.level]||'mild'}">${w.levelLabel}</span>`);

  document.getElementById('page-learn').innerHTML=`
    <div class="lc">
      <div class="lc-group">${w.group}</div>
      <div class="lc-word">${w.word}</div>
      <div class="lc-pos">${w.pos}</div>

function chooseFill(val,ans,el){

}

function testNext(m){testIdx++;if(m==='fill')renderFill();else if(m==='mcq')renderMCQ();}

// ===== MATCH =====
function startMatch(words){
  let pool=[...words];
  if(pool.length<4){const extra=VOCAB.filter(v=>!pool.find(p=>p.word===v.word));pool=pool.concat(shuffle(extra).slice(0,6-pool.length));}
  matchWords=shuffle(pool).slice(0,6);
  matchSelId=null;matchSelType=null;matchDone=0;
  showPage('test');renderMatch();
}

function renderMatch(){
  const lefts=shuffle(matchWords.map(w=>({id:w.word,text:w.word})));
  const rights=shuffle(matchWords.map(w=>({id:w.word,text:w.thai})));
  let html='<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">จับคู่คำกับความหมาย</div><div class="match-grid">';
  const n=Math.max(lefts.length,rights.length);
  for(let i=0;i<n;i++){
    if(lefts[i]) html+=`<div class="mi" id="ml-${lefts[i].id}" onclick="selMatch('${lefts[i].id}','en')">${lefts[i].text}</div>`;
    else html+='<div></div>';
    if(rights[i]) html+=`<div class="mi" id="mr-${rights[i].id}" onclick="selMatch('${rights[i].id}','th')">${rights[i].text}</div>`;
    else html+='<div></div>';
  }
  html+='</div><button class="btn" style="width:100%;margin-top:8px;" onclick="showPage('home')">🏠 กลับ</button>';
  document.getElementById('page-test').innerHTML=html;
}

function selMatch(id,type){
  const el=document.getElementById(type==='en'?`ml-${id}`:`mr-${id}`);
  if(!el||el.classList.contains('matched')) return;
  if(matchSelId===null){
    matchSelId=id;matchSelType=type;el.classList.add('msel');
  } else {
    const prev=document.getElementById(matchSelType==='en'?`ml-${matchSelId}`:`mr-${matchSelId}`);
    if(matchSelType!==type&&matchSelId===id){
      el.classList.remove('msel');el.classList.add('matched');
      if(prev){prev.classList.remove('msel');prev.classList.add('matched');}
      matchDone++;
      if(matchDone>=matchWords.length) setTimeout(()=>{document.getElementById('page-test').innerHTML=`<div class="end-screen"><div class="end-score">🎉</div><div class="end-label">จับคู่ครบ!</div><div class="btn-row"><button class="btn" style="flex:1" onclick="showPage('home')">🏠 กลับ</button><button class="btn btn-red" style="flex:1" onclick="startMatch(getSelectedWords())">🔄 ใหม่</button></div></div>`;},300);
    } else {
      el.classList.add('mwrong');if(prev)prev.classList.add('mwrong');
      setTimeout(()=>{el.classList.remove('mwrong','msel');if(prev)prev.classList.remove('mwrong','msel');},500);
    }
    matchSelId=null;matchSelType=null;
  }
}

// ===== ORDER =====
function startOrder(words){
  const groups=getGroups().filter(g=>selGroups.includes(g.gid)&&g.words.filter(w=>w.level).length>=2);
  if(groups.length===0){alert('เลือกหมวดที่มีคำหลายระดับ');return;}
  const g=groups[Math.floor(Math.random()*groups.length)];
  const sorted=[...g.words].filter(w=>w.level).sort((a,b)=>a.level-b.level);
  const items=shuffle(sorted.map((w,i)=>({...w,correctPos:i})));
  showPage('test');
  let html='<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">ลากเรียงจากเบาสุด → แรงสุด</div><div id="orderList">';
  items.forEach((w,i)=>{html+=`<div class="oi" draggable="true" id="oi-${i}" data-idx="${i}"><div class="oi-num">${i+1}</div><div><div style="font-weight:700">${w.word}</div><div style="font-size:11px;color:var(--text2)">${w.thai}</div></div></div>`;});
  html+=`</div><button onclick="checkOrder()" style="width:100%;padding:11px;background:var(--blue);border:none;color:var(--text);border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;margin:10px 0;">✓ ตรวจ</button><div id="orderFb"></div><button class="btn" style="width:100%;margin-top:8px;" onclick="showPage('home')">🏠 กลับ</button>`;
  document.getElementById('page-test').innerHTML=html;
  window._orderCorrect=sorted;window._orderItems=items;
  initDrag();
}

function initDrag(){
  let src=null;
  document.querySelectorAll('.oi').forEach(el=>{
    el.addEventListener('dragstart',function(){src=this;this.style.opacity='0.5';});
    el.addEventListener('dragend',function(){this.style.opacity='1';});
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',function(e){
      e.preventDefault();
      if(src!==this){
        const list=document.getElementById('orderList');
        const items=[...list.children];
        const si=items.indexOf(src),di=items.indexOf(this);
        if(si<di)list.insertBefore(src,this.nextSibling);else list.insertBefore(src,this);
      }
    });
  });
}

function checkOrder(){
  const list=document.getElementById('orderList');
  const correct=window._orderCorrect;const items=window._orderItems;
  let all=true;
  [...list.children].forEach((el,i)=>{
    const w=items[parseInt(el.dataset.idx)];
    if(w.word===correct[i]?.word)el.classList.add('correct-pos');
    else{el.classList.add('wrong-pos');all=false;}
  });
  const fb=document.getElementById('orderFb');
  fb.innerHTML=all?`<div style="background:#0a2a0a;border-radius:8px;padding:10px;color:#5dde5d;font-weight:700;">✓ ถูกต้อง!</div>`:`<div style="background:#2a0a0a;border-radius:8px;padding:10px;">คำเรียงที่ถูก: ${correct.map(w=>`<strong>${w.word}</strong>`).join(' → ')}</div>`;
}

// ===== CLUSTER DUMP =====
function startClusterPick(){
  showPage('test');
  let html='<div class="page-title" style="font-size:18px;">⚡ Cluster Dump</div><div class="page-sub">เลือกหมวดแล้วพิมพ์ synonym ให้เยอะสุดใน 60 วิ</div>';
  CLUSTERS.forEach((c,i)=>{
    html+=`<div class="gc" id="clg-${i}" onclick="toggleCL(${i})" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
      <div><div class="gc-name">${c.thai}</div><div class="gc-count">${c.words.length} คำ</div></div>
      <div id="clck-${i}" style="display:none;color:var(--red);font-weight:800;">✓</div>
    </div>`;
  });
  html+=`<button class="start-btn" id="clStartBtn" onclick="beginCL()" disabled style="margin-top:10px;">▶ เริ่ม Cluster Dump</button>`;
  html+=`<button class="btn" style="width:100%;margin-top:8px;" onclick="showPage('home')">🏠 กลับ</button>`;
  document.getElementById('page-test').innerHTML=html;
  window._clSel=[];
}

function toggleCL(i){
  if(!window._clSel) window._clSel=[];
  const ix=window._clSel.indexOf(i);
  const el=document.getElementById('clg-'+i);
  const ck=document.getElementById('clck-'+i);
  if(ix>=0){window._clSel.splice(ix,1);el.classList.remove('sel');ck.style.display='none';}
  else{window._clSel.push(i);el.classList.add('sel');ck.style.display='block';}
  document.getElementById('clStartBtn').disabled=window._clSel.length===0;
}

function beginCL(){
  clQueue=window._clSel.map(i=>CLUSTERS[i]);
  clIdx=0;clTotalScore=0;clRoundResults=[];
  startCLRound();
}

function startCLRound(){
  if(clIdx>=clQueue.length){showCLResult();return;}
  const c=clQueue[clIdx];
  clFound=[];clTimeLeft=60;
  const tagColors={formal:'hp-formal',spoken:'hp-spoken',literary:'hp-literary',strong:'hp-strong',mild:'hp-mild'};
  const allTags=[...new Set(c.words.flatMap(w=>w.tags))];

  document.getElementById('page-test').innerHTML=`
    <div class="cl-header">
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="ring-bg" cx="26" cy="26" r="22"/>
          <circle class="ring-fill" id="clRing" cx="26" cy="26" r="22" style="stroke-dashoffset:0"/>
        </svg>
        <div class="timer-num" id="clTimer">60</div>
      </div>
      <div class="cl-meta"><div class="cl-thai">${c.thai}</div><div class="cl-hint">${c.hint}</div></div>
      <div class="cl-score"><div class="cl-score-n" id="clScore">${clTotalScore}</div><div class="cl-score-l">pts</div></div>
    </div>
    <div class="cl-input-row">
      <input type="text" class="cl-inp" id="clInp" placeholder="พิมพ์ synonym..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="cl-skip" onclick="clSkip()">ข้าม</button>
    </div>
    <div class="found-row" id="clFound"></div>
    <div class="hint-pills">${allTags.map(t=>`<span class="hp ${tagColors[t]||''}">${t}</span>`).join('')}</div>
    <button onclick="clReveal()" style="width:100%;padding:8px;background:var(--blue);border:none;color:var(--text2);border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:8px;">แสดงคำที่เหลือ</button>
    <button class="btn" style="width:100%;" onclick="showPage('home')">🏠 กลับ</button>`;

  const inp=document.getElementById('clInp');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();clSubmit();}});
  inp.addEventListener('input',function(){
    const v=this.value.trim().toLowerCase();
    this.className=clQueue[clIdx].words.some(w=>w.w===v&&!clFound.includes(w.w))?'cl-inp cl-ok':'cl-inp';
  });
  inp.focus();
  clearInterval(clTimerInterval);
  clTimerInterval=setInterval(clTick,1000);
}

function clTick(){
  clTimeLeft--;
  document.getElementById('clTimer').textContent=clTimeLeft;
  const off=138*(1-clTimeLeft/60);
  const ring=document.getElementById('clRing');
  if(ring){ring.style.strokeDashoffset=off;if(clTimeLeft<=10)ring.style.stroke='var(--red)';}
  if(clTimeLeft<=0){clearInterval(clTimerInterval);clEndRound();}
}

function clSubmit(){
  const inp=document.getElementById('clInp');
  const val=inp.value.trim().toLowerCase();
  if(!val)return;
  const c=clQueue[clIdx];
  const match=c.words.find(w=>w.w===val&&!clFound.includes(w.w));
  if(match){
    clFound.push(match.w);
    const pts=match.tags.includes('strong')?30:(match.tags.includes('formal')||match.tags.includes('literary'))?20:10;
    clTotalScore+=pts;
    document.getElementById('clScore').textContent=clTotalScore;
    const p=document.createElement('span');p.className='fp fp-ok';p.textContent=match.w;
    document.getElementById('clFound').appendChild(p);
    inp.value='';inp.className='cl-inp';
    if(clFound.length>=c.words.length){clearInterval(clTimerInterval);setTimeout(clEndRound,300);}
  } else {
    inp.classList.add('cl-err');setTimeout(()=>inp.classList.remove('cl-err'),300);inp.select();
  }
}

function clSkip(){clearInterval(clTimerInterval);clEndRound();}
function clReveal(){
  clearInterval(clTimerInterval);
  const c=clQueue[clIdx];
  c.words.forEach(w=>{if(!clFound.includes(w.w)){const p=document.createElement('span');p.className='fp fp-miss';p.textContent=w.w;document.getElementById('clFound').appendChild(p);}});
  setTimeout(clEndRound,600);
}

function clEndRound(){
  clearInterval(clTimerInterval);
  clRoundResults.push({cluster:clQueue[clIdx],found:[...clFound]});
  clIdx++;setTimeout(startCLRound,300);
}

function showCLResult(){
  const total=clRoundResults.reduce((s,r)=>s+r.cluster.words.length,0);
  const found=clRoundResults.reduce((s,r)=>s+r.found.length,0);
  const pct=Math.round(found/total*100);
  let html=`<div class="end-screen"><div class="end-score">${clTotalScore} pts</div><div class="end-label">นึกออก ${found}/${total} (${pct}%) — ${pct>=80?'เยี่ยม! 🔥':pct>=60?'ดี! 👍':'ฝึกต่อ 💪'}</div></div>`;
  clRoundResults.forEach(r=>{
    html+=`<div style="background:var(--bg2);border-radius:10px;padding:14px;margin-bottom:8px;"><div style="font-size:16px;font-weight:800;margin-bottom:8px;">${r.cluster.thai}</div>`;
    r.cluster.words.forEach(w=>{
      const ok=r.found.includes(w.w);
      html+=`<div style="background:${ok?'#0a2a0a':'#2a0a0a'};border-radius:6px;padding:7px 10px;margin-bottom:5px;"><div style="font-size:13px;font-weight:700;color:${ok?'#5dde5d':'var(--red)'}">${ok?'✓':'✗'} ${w.w}</div><div style="font-size:11px;color:var(--text2)">${w.note}</div></div>`;
    });
    html+='</div>';
  });
  html+=`<div class="btn-row"><button class="btn" style="flex:1" onclick="showPage('home')">🏠 กลับ</button><button class="btn btn-red" style="flex:1" onclick="beginCL()">🔄 ใหม่</button></div>`;
  document.getElementById('page-test').innerHTML=html;
}

// ===== END SCREEN =====
function renderEnd(){
  const pct=Math.round(testScore/testWords.length*100);
  let html=`<div class="end-screen">
    <div class="end-score">${testScore}/${testWords.length}</div>
    <div class="end-label">${pct}% — ${pct>=80?'ยอดเยี่ยม! 🎉':pct>=60?'ดีมาก! 👍':'ฝึกต่อนะครับ 💪'}</div>`;
  if(testWrong.length>0){
    html+=`<div class="btn-row" style="margin-bottom:12px;"><button class="btn" style="flex:1" onclick="showPage('home')">🏠 กลับ</button><button class="btn btn-red" style="flex:1" onclick="retryWrong()">ทบทวน ${testWrong.length} คำ</button></div>`;
    html+=`<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">📋 คำที่ต้องทบทวน</div>`;
    testWrong.forEach(w=>{html+=`<div class="wr-item"><div class="wr-word">${w.word}</div><div class="wr-thai">${w.thai}</div><div class="wr-note">${w.note||''}</div>${w.colloc?`<div style="font-size:11px;color:#5dde5d;margin-top:2px;">📌 ${w.colloc}</div>`:''}</div>`;});
  } else {
    html+=`<div class="btn-row"><button class="btn" style="flex:1" onclick="showPage('home')">🏠 กลับ</button></div>`;
  }
  html+='</div>';
  document.getElementById('page-test').innerHTML=html;
}

function retryWrong(){
  testWords=shuffle(testWrong);testIdx=0;testScore=0;testWrong=[];
  if(selMode==='fill')renderFill();else if(selMode==='mcq')renderMCQ();
}

// ===== INIT =====
buildHome();
showPage('home');
</script>
</body>
</html>
